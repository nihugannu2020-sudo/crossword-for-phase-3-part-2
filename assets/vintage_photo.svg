<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sepia-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#805a36" />
      <stop offset="100%" stop-color="#3b2510" />
    </linearGradient>
    <radialGradient id="photo-vignette" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000" stop-opacity="0.8" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#sepia-grad)" />
  <!-- Vignette / shadow overlay -->
  <rect width="200" height="200" fill="url(#photo-vignette)" />
  <!-- Silhouette of a person under streetlight -->
  <circle cx="100" cy="70" r="1.5" fill="#fcf9f2" opacity="0.8"/>
  <!-- Streetlight beam -->
  <polygon points="100,50 30,200 170,200" fill="#fcf9f2" opacity="0.15"/>
  <!-- Pinned person silhouette -->
  <path d="M 100,85 C 107,85 112,90 112,97 C 112,104 107,109 100,109 C 93,109 88,104 88,97 C 88,90 93,85 100,85 Z" fill="#1b1007"/>
  <path d="M 100,113 C 80,113 70,135 70,170 L 130,170 C 130,135 120,113 100,113 Z" fill="#1b1007"/>
  <!-- Grit/Scratch lines -->
  <line x1="20" y1="10" x2="35" y2="190" stroke="#fcf9f2" stroke-width="0.5" opacity="0.15" />
  <line x1="180" y1="50" x2="160" y2="170" stroke="#fcf9f2" stroke-width="0.3" opacity="0.1" />
</svg>
